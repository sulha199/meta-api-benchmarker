# .github/workflows/supabase-migration.yml

name: Supabase Database Migration

on:
  push:
    branches:
      - main
    paths:
      - 'apps/backend-supabase/supabase/migrations/**'
  # Allows manual execution from the Actions tab
  workflow_dispatch:

jobs:
  deploy-migrations:
    name: Deploy to Supabase
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Install Supabase CLI
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Step 3: Link the project to explicitly negotiate an IPv4 connection
      # This resolves the GitHub Actions IPv6 limitation
      - name: Link Supabase Project
        working-directory: ./apps/backend-supabase
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --password ${{ secrets.SUPABASE_DB_PASSWORD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Step 4: Execute the migration deployment
      - name: Push Database Migrations
        working-directory: ./apps/backend-supabase
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
