type Comment {
  id: ID!
  authorId: String!
  commentText: String!
  createdAt: String
}

type Article {
  id: ID!
  title: String!
  contentBody: String!
  createdAt: String
  comments: [Comment!]!
}

type BenchmarkResult {
  latencyMs: Int!
  payloadSizeKb: Float!
  data: [Article!]!
}

type AstResult {
  id: ID!
  visitorId: ID
  scenario: String!
  endpoint: String!
  databaseType: DatabaseType!
  queriedFields: [String!]!
  queriedRelations: [String!]!
  requestCount: Int!
  avgLatencyMs: Int!
  payloadSizeKb: Float!
  createdAt: String
}

input SubmitAstResultInput {
  visitorId: ID
  scenario: String!
  endpoint: String!
  databaseType: DatabaseType!
  queriedFields: [String!]!
  queriedRelations: [String!]!
  requestCount: Int!
  avgLatencyMs: Int!
  payloadSizeKb: Float!
}

enum DatabaseType {
  POSTGRES
  MONGO
}

type Query {
  getArticlesLazy(dbType: DatabaseType!): BenchmarkResult!
  getArticlesOptimized(dbType: DatabaseType!): BenchmarkResult!
}

type Mutation {
  submitAstResult(input: SubmitAstResultInput!): AstResult!
}
